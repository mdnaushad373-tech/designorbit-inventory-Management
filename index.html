function n2w(num){
  const a=["","One","Two","Three","Four","Five","Six","Seven","Eight","Nine","Ten","Eleven","Twelve","Thirteen","Fourteen","Fifteen","Sixteen","Seventeen","Eighteen","Nineteen"];
  const b=["","","Twenty","Thirty","Forty","Fifty","Sixty","Seventy","Eighty","Ninety"];
  function w(n){if(n<20)return a[n];if(n<100)return b[~~(n/10)]+(n%10?" "+a[n%10]:"");if(n<1000)return a[~~(n/100)]+" Hundred"+(n%100?" "+w(n%100):"");if(n<100000)return w(~~(n/1000))+" Thousand"+(n%1000?" "+w(n%1000):"");if(n<10000000)return w(~~(n/100000))+" Lakh"+(n%100000?" "+w(n%100000):"");return w(~~(n/10000000))+" Crore"+(n%10000000?" "+w(n%10000000):"");}
  const r=~~num,p=Math.round((num-r)*100);
  return "INR "+(r?w(r)+" Rupees":"")+(p?" and "+w(p)+" Paise":"")+" Only";
}

function Btn({children,onClick,color="blue",style={},small,disabled}){
  const C={blue:{bg:"linear-gradient(135deg,#2563eb,#1d4ed8)",gl:"#3b82f644",bd:"#3b82f6"},green:{bg:"linear-gradient(135deg,#16a34a,#15803d)",gl:"#22c55e44",bd:"#22c55e"},red:{bg:"linear-gradient(135deg,#dc2626,#b91c1c)",gl:"#f8717144",bd:"#f87171"},purple:{bg:"linear-gradient(135deg,#7c3aed,#6d28d9)",gl:"#818cf844",bd:"#818cf8"},amber:{bg:"linear-gradient(135deg,#d97706,#b45309)",gl:"#fbbf2444",bd:"#fbbf24"},gray:{bg:"linear-gradient(135deg,#374151,#1f2937)",gl:"#6b728044",bd:"#6b7280"},teal:{bg:"linear-gradient(135deg,#0d9488,#0f766e)",gl:"#2dd4bf44",bd:"#2dd4bf"},pink:{bg:"linear-gradient(135deg,#db2777,#be185d)",gl:"#f9a8d444",bd:"#f9a8d4"}};
  const c=C[color]||C.blue;
  const [h,sH]=useState(false);
  return(
    <button onClick={onClick} disabled={disabled} onMouseEnter={()=>sH(true)} onMouseLeave={()=>sH(false)}
      style={{background:c.bg,color:"#fff",border:`1px solid ${h?c.bd:"transparent"}`,borderRadius:small?9:12,padding:small?"7px 14px":"13px",fontSize:small?12:14,fontWeight:800,cursor:disabled?"not-allowed":"pointer",opacity:disabled?0.5:1,fontFamily:"'Outfit',sans-serif",transition:"all 0.2s",boxShadow:h?`0 0 18px ${c.gl},0 4px 20px ${c.gl}`:`0 3px 12px ${c.gl}`,transform:h&&!disabled?"translateY(-1px)":"none",position:"relative",overflow:"hidden",...style}}>
      {children}
    </button>
  );
}

function Card({children,style={},delay=0,color="#402fb5"}){
  const [h,sH]=useState(false);
  return(
    <div onMouseEnter={()=>sH(true)} onMouseLeave={()=>sH(false)}

function ItemPicker({items,value,onChange}){
  const [open,sO]=useState(false);
  const [q,sQ]=useState("");
  const ref=useRef(),inp=useRef();
  const sel=items.find(i=>i.id===value);
  const list=items.filter(i=>i.name.toLowerCase().includes(q.toLowerCase())||i.code.toLowerCase().includes(q.toLowerCase())).slice(0,80);
  useEffect(()=>{if(open)setTimeout(()=>inp.current?.focus(),50);},[open]);
  useEffect(()=>{const h=e=>{if(ref.current&&!ref.current.contains(e.target))sO(false)};document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);},[]);
  return(
    <div ref={ref} style={{position:"relative"}}>
      <div onClick={()=>sO(o=>!o)} style={{background:"#0a0d18",border:`1px solid ${open?"#402fb5":"#1e2d45"}`,borderRadius:10,padding:"10px 13px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{fontSize:13,color:sel?"#f1f5f9":"#3d5068",fontWeight:sel?700:400}}>{sel?`${sel.name} [${sel.code}]`:"🔍 Search & select item…"}</span>
        <span style={{color:"#402fb5",fontSize:11,display:"inline-block",transform:open?"rotate(180deg)":"none",transition:"transform 0.2s"}}>▼</span>
      </div>
      {open&&(
        <div style={{position:"absolute",top:"calc(100% + 5px)",left:0,right:0,zIndex:80,background:"#0d1321",border:"1px solid #402fb533",borderRadius:12,boxShadow:"0 16px 48px rgba(0,0,0,0.85)",animation:"dropIn 0.16s ease"}}>
          <div style={{padding:"8px 8px 5px"}}>
            <div style={{display:"flex",alignItems:"center",background:"#070a12",borderRadius:9,padding:"7px 11px",border:"1px solid #1e2d45"}}>
              <span style={{marginRight:7}}>🔍</span>
              <input ref={inp} value={q} onChange={e=>sQ(e.target.value)} placeholder="Type name or code…" style={{background:"none",border:"none",outline:"none",color:"#f1f5f9",fontSize:13,width:"100%",fontFamily:"'Outfit',sans-serif"}}/>
              {q&&<span onClick={()=>sQ("")} style={{cursor:"pointer",color:"#4a6080"}}>✕</span>}
            </div>
          </div>
          <div style={{maxHeight:200,overflowY:"auto",padding:"0 5px 7px"}}>
            {list.length===0&&<div style={{textAlign:"center",color:"#334155",padding:"16px 0",fontSize:12}}>No items found</div>}
            {list.map((item,i)=>(
              <div key={item.id} onClick={()=>{onChange(item);sO(false);sQ("");}}
                style={{padding:"8px 10px",borderRadius:8,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",background:value===item.id?"#1e3a5f":"transparent",transition:"background 0.12s"}}

                  <div style={{fontSize:12,fontWeight:700,color:"#f1f5f9"}}>{item.name}</div>
                  <div style={{fontSize:10,color:"#3d5068"}}>SKU:{item.code} · {item.category||"—"} · Stock:{fmtQ(item.qty)}</div>
                </div>
                <div style={{background:sCol(item.qty)+"22",color:sCol(item.qty),fontWeight:800,fontSize:11,borderRadius:6,padding:"2px 8px"}}>{fmtQ(item.qty)}</div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// Party picker
function PartyPicker({parties,value,onChange,placeholder}){
  const [open,sO]=useState(false);
  const [q,sQ]=useState("");
  const ref=useRef(),inp=useRef();
  const list=parties.filter(p=>p.name.toLowerCase().includes(q.toLowerCase()));
  useEffect(()=>{if(open)setTimeout(()=>inp.current?.focus(),50);},[open]);
  useEffect(()=>{const h=e=>{if(ref.current&&!ref.current.contains(e.target))sO(false)};document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);},[]);

    <div ref={ref} style={{position:"relative",marginBottom:10}}>

          <div style={{padding:"7px 7px 4px"}}>

            {list.map((p,i)=>(
              <div key={p.id} onClick={()=>{onChange(p);sO(false);sQ("");}}

        </div>
      )}

  );
}

// ── REPORTS SECTION ───────────────────────────────────────────────────────────
function Reports({items,txns,invList}){
  const [period,sP]=useState("month");
  const now=new Date();
  const filterDate=t=>{
    const d=new Date(t.date.split(",")[0].split("/").reverse().join("-")||Date.now());
    if(period==="week"){const w=new Date();w.setDate(w.getDate()-7);return d>=w;}
    if(period==="month")return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
    if(period==="year")return d.getFullYear()===now.getFullYear();
    return true;
  };
  const saleTxns=txns.filter(t=>t.type==="OUT"&&filterDate(t));
  const purTxns=txns.filter(t=>t.type==="IN"&&filterDate(t));
  const saleInvs=invList.filter(iv=>iv.type==="sale");
  const totalSaleVal=saleInvs.reduce((s,iv)=>s+(iv.grandTotal||0),0);
  // top moving items
  const itemSales={};
  saleTxns.forEach(t=>{if(!itemSales[t.itemName])itemSales[t.itemName]={name:t.itemName,qty:0};itemSales[t.itemName].qty+=t.qty;});
  const topItems=Object.values(itemSales).sort((a,b)=>b.qty-a.qty).slice(0,8);
  // low stock alerts
  const lowStock=items.filter(i=>i.qty<=( i.reorderQty||5)&&i.qty>0);
  const outStock=items.filter(i=>i.qty===0);
  // category breakdown
  const catBreak={};
  items.forEach(i=>{const c=i.category||"Other";if(!catBreak[c])catBreak[c]={cat:c,count:0,totalQty:0};catBreak[c].count++;catBreak[c].totalQty+=i.qty;});
  const catList=Object.values(catBreak).sort((a,b)=>b.count-a.count);
  const catColors=["#6366f1","#22c55e","#f97316","#06b6d4","#ec4899","#a855f7","#eab308","#14b8a6"];

  const StatBox=({label,val,sub,color})=>(
    <div style={{flex:1,background:"#0f1520",borderRadius:12,padding:"12px 10px",textAlign:"center",border:`1px solid ${color}22`,boxShadow:`0 0 14px ${color}11`}}>
      <div style={{fontSize:20,fontWeight:900,color,lineHeight:1}}>{val}</div>
      <div style={{fontSize:9,color:"#3d5068",marginTop:3,fontWeight:700}}>{label}</div>
      {sub&&<div style={{fontSize:10,color:"#4a6080",marginTop:2}}>{sub}</div>}
    </div>
  );

  return(
    <div style={{padding:14,animation:"slideIn 0.3s ease"}}>
      <div style={{fontSize:15,fontWeight:900,marginBottom:4,color:"#f0f6ff"}}>📊 Reports & Analytics</div>
      {/* Period filter */}
      <div style={{display:"flex",background:"#0f1520",borderRadius:11,padding:3,marginBottom:14,gap:3,border:"1px solid #1e2d45"}}>
        {[["week","This Week"],["month","This Month"],["year","This Year"],["all","All Time"]].map(([k,l])=>(
          <button key={k} onClick={()=>sP(k)} style={{flex:1,padding:"7px 4px",borderRadius:9,border:period===k?"1px solid #402fb544":"1px solid transparent",background:period===k?"#402fb522":"transparent",color:period===k?"#818cf8":"#3d5068",fontWeight:800,fontSize:11,cursor:"pointer",fontFamily:"'Outfit',sans-serif",transition:"all 0.2s"}}>{l}</button>
        ))}
      </div>

      {/* Summary stats */}
      <div style={{display:"flex",gap:7,marginBottom:12}}>
        <StatBox label="Total Sales" val={fmtQ(saleTxns.reduce((s,t)=>s+t.qty,0))} sub="units out" color="#22c55e"/>
        <StatBox label="Purchases" val={fmtQ(purTxns.reduce((s,t)=>s+t.qty,0))} sub="units in" color="#60a5fa"/>
        <StatBox label="Invoice Value" val={`₹${(totalSaleVal/1000).toFixed(0)}K`} sub="all time" color="#fbbf24"/>
        <StatBox label="Total SKUs" val={items.length} sub={`${outStock.length} out`} color="#f87171"/>
      </div>

      {/* Low Stock Alerts */}
      {(lowStock.length>0||outStock.length>0)&&(
        <Card color="#f97316" style={{padding:"12px 14px",marginBottom:12}}>
          <div style={{fontSize:12,fontWeight:800,color:"#fb923c",marginBottom:9}}>⚠️ STOCK ALERTS</div>
          {outStock.slice(0,5).map(i=>(
            <div key={i.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 0",borderBottom:"1px solid #1e2d45"}}>
              <div><div style={{fontSize:12,fontWeight:700,color:"#f87171"}}>{i.name}</div><div style={{fontSize:10,color:"#3d5068"}}>{i.category}</div></div>
              <div style={{background:"#ef444422",color:"#f87171",fontWeight:800,fontSize:11,borderRadius:6,padding:"2px 9px"}}>OUT OF STOCK</div>
            </div>
          ))}
          {lowStock.slice(0,5).map(i=>(
            <div key={i.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 0",borderBottom:"1px solid #1e2d45"}}>
              <div><div style={{fontSize:12,fontWeight:700,color:"#fb923c"}}>{i.name}</div><div style={{fontSize:10,color:"#3d5068"}}>{i.category}</div></div>
              <div style={{background:"#f9731622",color:"#fb923c",fontWeight:800,fontSize:11,borderRadius:6,padding:"2px 9px"}}>Only {fmtQ(i.qty)} left</div>
            </div>
          ))}
        </Card>
      )}

      {/* Top Moving Items */}
      {topItems.length>0&&(
        <Card color="#22c55e" style={{padding:"12px 14px",marginBottom:12}}>
          <div style={{fontSize:12,fontWeight:800,color:"#4ade80",marginBottom:10}}>🏆 TOP MOVING ITEMS</div>
          {topItems.map((it,i)=>{
            const pct=Math.round((it.qty/topItems[0].qty)*100);
            return(
              <div key={it.name} style={{marginBottom:8}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                  <span style={{fontSize:12,fontWeight:700,color:"#f1f5f9"}}>{i+1}. {it.name}</span>
                  <span style={{fontSize:11,color:"#4ade80",fontWeight:800}}>{fmtQ(it.qty)} pcs</span>
                </div>
                <div style={{background:"#1e2d45",borderRadius:4,height:5,overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${pct}%`,background:`linear-gradient(90deg,#22c55e,#4ade80)`,borderRadius:4,transition:"width 0.5s ease"}}/>
                </div>
              </div>
            );
          })}
        </Card>
      )}

      {/* Category Breakdown */}
      <Card color="#818cf8" style={{padding:"12px 14px",marginBottom:12}}>
        <div style={{fontSize:12,fontWeight:800,color:"#818cf8",marginBottom:10}}>📂 CATEGORY BREAKDOWN</div>
        {catList.map((c,i)=>(
          <div key={c.cat} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid #1e2d45"}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{width:8,height:8,borderRadius:"50%",background:catColors[i%catColors.length]}}/>
              <span style={{fontSize:12,fontWeight:700,color:"#f1f5f9"}}>{c.cat}</span>
            </div>
            <div style={{display:"flex",gap:10,fontSize:11}}>
              <span style={{color:"#4a6080"}}>{c.count} SKUs</span>
              <span style={{color:"#4ade80",fontWeight:700}}>{fmtQ(c.totalQty)} pcs</span>
            </div>
          </div>
        ))}
      </Card>

      {/* Recent Transactions */}
      <Card color="#60a5fa" style={{padding:"12px 14px"}}>
        <div style={{fontSize:12,fontWeight:800,color:"#60a5fa",marginBottom:10}}>🕐 RECENT ACTIVITY</div>
        {txns.slice(0,10).map((t,i)=>(
          <div key={t.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 0",borderBottom:i<9?"1px solid #1e2d45":"none"}}>
            <div>
              <div style={{fontSize:12,fontWeight:700,color:"#f1f5f9"}}>{t.itemName}</div>
              <div style={{fontSize:10,color:"#3d5068"}}>{t.note||"—"} · {t.date}</div>
            </div>
            <div style={{background:t.type==="IN"?"#16a34a22":"#dc262622",color:t.type==="IN"?"#4ade80":"#f87171",fontWeight:800,fontSize:11,borderRadius:6,padding:"2px 9px"}}>{t.type==="IN"?"+":"-"}{fmtQ(t.qty)}</div>
          </div>
        ))}
        {txns.length===0&&<div style={{textAlign:"center",color:"#2d3f55",padding:"16px 0",fontSize:12}}>No transactions yet</div>}
      </Card>
    </div>
  );
}

                    ):(

                return(
                  <div style={{display:"flex",gap:7,marginBottom:12}}>
                    <div style={{flex:1,background:"#dc262222",border:"1px solid #f8717133",borderRadius:10,padding:"10px",textAlign:"center"}}>
                      <div style={{fontSize:16,fontWeight:900,color:"#f87171"}}>{fmtQ(totalOut)}</div>
                      <div style={{fontSize:9,color:"#3d5068",fontWeight:700}}>TOTAL OUT (pcs)</div>
                    </div>
                    <div style={{flex:1,background:"#16a34a22",border:"1px solid #22c55e33",borderRadius:10,padding:"10px",textAlign:"center"}}>
                      <div style={{fontSize:16,fontWeight:900,color:"#4ade80"}}>{fmtQ(totalIn)}</div>
                      <div style={{fontSize:9,color:"#3d5068",fontWeight:700}}>TOTAL IN (pcs)</div>

                    <div style={{flex:1,background:"#d9770622",border:"1px solid #fbbf2433",borderRadius:10,padding:"10px",textAlign:"center"}}>

                      <div style={{fontSize:9,color:"#3d5068",fontWeight:700}}>INVOICE VALUE</div>
                    </div>

            <div style={{background:"#0d1321",border:"1px solid #1e3050",borderRadius:16,padding:18,width:"93%",maxWidth:480,animation:"popIn 0.2s ease"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>

                  <input style={{...INP,flex:1,marginBottom:0,textAlign:"center"}} type="number" placeholder="Qty" value={row.qty} onChange={e=>sCh(c=>({...c,items:c.items.map(r=>r.id===row.id?{...r,qty:e.target.value}:r)}))} onFocus={fi} onBlur={fo}/>
                  {challan.items.length>1&&<button onClick={()=>sCh(c=>({...c,items:c.items.filter(r=>r.id!==row.id)}))} style={{background:"#7f1d1d",color:"#fca5a5",border:"none",borderRadius:7,padding:"9px 10px",cursor:"pointer",fontWeight:700}}>✕</button>}
                </div>
              ))}
              <button onClick={()=>sCh(c=>({...c,items:[...c.items,{id:uid(),name:"",qty:"",unit:"Pcs"}]}))} style={{width:"100%",background:"transparent",color:"#818cf8",border:"1.5px dashed #2d2a6a",borderRadius:10,padding:"9px",fontSize:12,fontWeight:800,cursor:"pointer",marginBottom:10,fontFamily:"'Outfit',sans-serif"}}>＋ Add Item</button>

                <table style="margin-bottom:10px"><tr><td><b>Challan No:</b> ${challan.no}</td><td><b>Date:</b> ${challan.date}</td></tr><tr><td colspan="2"><b>To:</b> ${challan.toName} — ${challan.toAddress}</td></tr></table>

                <div style="text-align:center;margin-top:10px;font-size:9px;color:#666">This is a Computer Generated Delivery Challan</div>
                </body></html>`;

                            const fn=`Invoice-${iv.invoiceNo}-${iv.customerName}.html`.replace(/[^a-zA-Z0-9.\-_]/g,"_");
                            const html=`<!DOCTYPE html><html><head><meta charset="utf-8"><style>*{box-sizing:border-box;margin:0;padding:0;}body{font-family:Arial,sans-serif;}table{border-collapse:collapse;width:100%;}@page{size:A4;margin:8mm;}@media print{html,body{print-color-adjust:exact;}}</style></head><body onload="window.print()">${docEl.outerHTML}</body></html>`;
                            const blob=new Blob([html],{type:"text/html"});const url=URL.createObjectURL(blob);
                            const a=document.createElement("a");a.href=url;a.download=fn;a.style.display="none";document.body.appendChild(a);a.click();
                            setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);showToast("📄 Downloaded!");},400);
                          },500);
                        }} style={{flex:1}}>🖨️ PDF</Btn>
                      </div>
                    </Card>
                  );
              })}
              {(iHTab==="sale"?saleInvs:purInvs).filter(iv=>!invSearch||(iv.invoiceNo?.toLowerCase().includes(invSearch.toLowerCase())||iv.customerName?.toLowerCase().includes(invSearch.toLowerCase())||iv.items?.some(r=>r.name?.toLowerCase().includes(invSearch.toLowerCase())))).length===0&&(
                <div style={{textAlign:"center",color:"#2d3f55",padding:"44px 16px",fontSize:13}}>{invSearch?"No invoices match your search.":"No "+iHTab+" invoices yet. Go to 🧾 Invoice tab."}</div>
              )}
            </div>
          ):(
            <div style={{padding:14,animation:"slideIn 0.3s ease"}}>
              <div style={{display:"flex",gap:8,marginBottom:14}}>
                <Btn small color="gray" onClick={()=>sVI(null)} style={{flex:1}}>← Back</Btn>
                <Btn small color="green" disabled={dling} onClick={()=>{
                  sD(true);
                  setTimeout(()=>{
                    const docEl=document.getElementById("INV_DOC");
                    if(!docEl){sD(false);return;}
                    const iv=viewInv;
                    const fn=`Invoice-${iv.invoiceNo}-${iv.customerName}.html`.replace(/[^a-zA-Z0-9.\-_]/g,"_");
                    const html=`<!DOCTYPE html><html><head><meta charset="utf-8"><style>*{box-sizing:border-box;margin:0;padding:0;}body{font-family:Arial,sans-serif;}table{border-collapse:collapse;width:100%;}@page{size:A4;margin:8mm;}@media print{html,body{print-color-adjust:exact;-webkit-print-color-adjust:exact;}}</style></head><body onload="window.print()">${docEl.outerHTML}</body></html>`;
                    const blob=new Blob([html],{type:"text/html;charset=utf-8"});
                    const url=URL.createObjectURL(blob);
                    const a=document.createElement("a");a.href=url;a.download=fn;a.style.display="none";
                    document.body.appendChild(a);a.click();
                    setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);sD(false);showToast("📄 Downloaded! Open & Ctrl+P → Save as PDF");},500);
                  },300);
                }} style={{flex:1}}>{dling?"Preparing…":"🖨️ Download PDF"}</Btn>
              </div>
              <div style={{background:"#fff",borderRadius:12,overflow:"hidden",boxShadow:"0 4px 32px rgba(0,0,0,0.5)"}}>
                <InvoiceDoc inv={viewInv} company={company}/>
              </div>
            </div>
          )}
          </>
        )}


        {/* ── ADD ITEM ── */}
        {tab==="add-item"&&(
          <div style={{padding:14,animation:"slideIn 0.3s ease"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
              <div style={{fontSize:15,fontWeight:900,color:"#f0f6ff"}}>➕ Register New SKU</div>
              <button onClick={()=>sIM(true)} style={{background:"linear-gradient(135deg,#16a34a,#15803d)",color:"#fff",border:"none",borderRadius:9,padding:"6px 12px",fontSize:11,fontWeight:800,cursor:"pointer",fontFamily:"'Outfit',sans-serif"}}>📥 Import CSV</button>
            </div>
            <div style={{fontSize:12,color:"#3d5068",marginBottom:14}}>Add item or bulk import from Excel/CSV</div>
            <label style={LBL}>Item Code / SKU</label>
            <input style={INP} placeholder="e.g. 0810" value={form.code} onChange={e=>sFrm(v=>({...v,code:e.target.value}))} onFocus={fi} onBlur={fo}/>
            <label style={LBL}>Item Name *</label>
            <input style={INP} placeholder="e.g. 0810 MACHINE" value={form.name} onChange={e=>sFrm(v=>({...v,name:e.target.value}))} onFocus={fi} onBlur={fo}/>
            <label style={LBL}>Category *</label>
            <div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:10}}>
              {cats.map(c=>{const active=form.category?.toLowerCase()===c.toLowerCase();const cc=catColor(c);return(<button key={c} onClick={()=>sFrm(v=>({...v,category:c}))} style={{background:active?cc+"33":"#0a0d18",border:`1.5px solid ${active?cc:cc+"33"}`,borderRadius:20,padding:"5px 14px",fontSize:12,fontWeight:800,cursor:"pointer",color:active?cc:"#4a6080",fontFamily:"'Outfit',sans-serif",transition:"all 0.18s"}}>{c}</button>);})}
            </div>
            <div style={{background:"#0a0d18",border:"1px dashed #2d3f55",borderRadius:11,padding:"10px 12px",marginBottom:12}}>
              <div style={{fontSize:10,color:"#818cf8",fontWeight:800,marginBottom:7}}>➕ NEW CATEGORY — type &amp; press Enter</div>
              <div style={{display:"flex",gap:7}}>
                <input style={{flex:1,background:"#070a12",border:"1.5px solid #1e2d45",borderRadius:9,padding:"9px 13px",color:"#f1f5f9",fontSize:13,outline:"none",fontFamily:"'Outfit',sans-serif"}} placeholder="e.g. Switch, Bearing…" value={newCat} onChange={e=>sNC(e.target.value)} onFocus={fi} onBlur={fo}
                  onKeyDown={async e=>{if(e.key==="Enter"&&newCat.trim()){const nc=newCat.trim();if(!cats.find(c=>c.toLowerCase()===nc.toLowerCase())){const u=[...cats,nc];sC(u);await saveData(CATS_KEY,u);}sFrm(v=>({...v,category:nc}));sNC("");showToast(`✅ "${nc}" added & selected!`);}}}/>
                <button onClick={async()=>{if(!newCat.trim())return;const nc=newCat.trim();if(!cats.find(c=>c.toLowerCase()===nc.toLowerCase())){const u=[...cats,nc];sC(u);await saveData(CATS_KEY,u);}sFrm(v=>({...v,category:nc}));sNC("");showToast(`✅ "${nc}" added!`);}} style={{background:"linear-gradient(135deg,#0d9488,#0f766e)",color:"#fff",border:"none",borderRadius:9,padding:"9px 16px",fontSize:13,fontWeight:800,cursor:"pointer",fontFamily:"'Outfit',sans-serif"}}>+ Add</button>
              </div>
            </div>
            <div style={{display:"flex",gap:8}}>
              <div style={{flex:1}}><label style={LBL}>Unit</label><select style={INP} value={form.unit} onChange={e=>sFrm(v=>({...v,unit:e.target.value}))}>{["Pcs","Set","Box","Kg","Meter","Ltr","Pair","Roll"].map(u=><option key={u}>{u}</option>)}</select></div>
              <div style={{flex:1}}><label style={LBL}>Opening Stock</label><input style={INP} type="number" placeholder="0" value={form.qty} onChange={e=>sFrm(v=>({...v,qty:e.target.value}))} onFocus={fi} onBlur={fo}/></div>
            </div>
            <div style={{display:"flex",gap:8}}>
              <div style={{flex:1}}><label style={LBL}>Buy Price ₹</label><input style={INP} type="number" placeholder="0" value={form.buyPrice} onChange={e=>sFrm(v=>({...v,buyPrice:e.target.value}))} onFocus={fi} onBlur={fo}/></div>
              <div style={{flex:1}}><label style={LBL}>Sell Price ₹</label><input style={INP} type="number" placeholder="0" value={form.sellPrice} onChange={e=>sFrm(v=>({...v,sellPrice:e.target.value}))} onFocus={fi} onBlur={fo}/></div>
              <div style={{flex:1}}><label style={LBL}>Reorder At</label><input style={INP} type="number" placeholder="5" value={form.reorderQty} onChange={e=>sFrm(v=>({...v,reorderQty:e.target.value}))} onFocus={fi} onBlur={fo}/></div>
            </div>
            {form.name&&(
              <div style={{background:"#0a0d18",border:"1px solid #1e2d45",borderRadius:10,padding:"10px 13px",marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:13,fontWeight:700,color:"#f1f5f9"}}>{form.name.toUpperCase()}</span>
                <span style={{background:catColor(form.category)+"22",color:catColor(form.category),padding:"2px 10px",borderRadius:10,fontSize:11,fontWeight:700}}>{form.category}</span>
              </div>
            )}
            <Btn color="blue" onClick={handleAddItem} style={{width:"100%"}}>✅ Register Item in Inventory</Btn>
          </div>
        )}

        {/* BOTTOM NAV */}
        <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:520,background:"#070a12",borderTop:"1px solid #1a2540",display:"flex",justifyContent:"space-around",padding:"6px 0 10px",zIndex:20,backdropFilter:"blur(10px)"}}>
          {NAV.map(n=>{
            const alert=n.id==="reports"&&(lowStockCount+outStockCount)>0;
            return(
              <button key={n.id} onClick={()=>{sTab(n.id);sSr("");sSI(false);sVI(null);}} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:1,background:"none",border:"none",color:tab===n.id?"#818cf8":"#2d3f55",cursor:"pointer",fontSize:8,fontWeight:800,padding:"3px 4px",fontFamily:"'Outfit',sans-serif",transition:"all 0.2s",transform:tab===n.id?"translateY(-3px)":"none",position:"relative"}}>
                <span style={{fontSize:17,filter:tab===n.id?"drop-shadow(0 0 6px #818cf8)":"none"}}>{n.icon}</span>
                {n.label}
                {alert&&<span style={{position:"absolute",top:0,right:2,width:7,height:7,borderRadius:"50%",background:"#ef4444",animation:"pulse 1.5s infinite"}}/>}
              </button>
            );
          })}
        </div>

      </div>
    </>
  );
}


const container = document.getElementById('root');
const root = ReactDOM.createRoot(container);
root.render(React.createElement(App));
window.__appMounted = true;
if(window.__hideBootOverlay) window.__hideBootOverlay();
  </script>
  <script>
    if("serviceWorker" in navigator){
      window.addEventListener("load",function(){
        navigator.serviceWorker.register("sw.js").catch(function(){});
      });
    }
  </script>
</body>
</html>
